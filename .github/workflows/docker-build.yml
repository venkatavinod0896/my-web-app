name: Build and Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin 527769887303.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Image
        run: |
          docker build -t my-web-app ./my-web-app
          docker tag my-web-app:latest 527769887303.dkr.ecr.us-east-1.amazonaws.com/my-web-app:latest

      - name: Push Image
        run: |
          docker push 527769887303.dkr.ecr.us-east-1.amazonaws.com/my-web-app:latest
