name: Full CI-CD GitOps Pipeline

on:
  push:
    branches: [main]
    # Prevent endless loop when workflow commits manifest changes
    paths-ignore:
      - "my-web-app/deployment.yaml"
      - "my-web-app/service.yaml"
      - "my-web-app/ingress.yaml"
      - "my-web-app/hpa.yaml"
      - "my-web-app/argocd-app.yaml"

concurrency:
  group: terraform-deploy
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: my-web-app
  CLUSTER_NAME: gitops-eks
  VPC_CIDR: 10.0.0.0/16

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # Checkout Repository
      # -------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------
      # Detect Terraform Changes (Reliable)
      # -------------------------------
      - name: Detect Terraform changes
        id: tf_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - "**/*.tf"
              - "**/*.tfvars"
              - "backend.tf"
              - "providers.tf"
              - "variables.tf"
              - "outputs.tf"

      # -------------------------------
      # Configure AWS Credentials (OIDC)
      # -------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::527769887303:role/github-actions-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify Identity
        run: aws sts get-caller-identity

      # -------------------------------
      # Setup Terraform (only if TF changed)
      # -------------------------------
      - name: Setup Terraform
        if: steps.tf_changes.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        if: steps.tf_changes.outputs.terraform == 'true'
        run: terraform fmt -check -recursive

      - name: Terraform Init
        if: steps.tf_changes.outputs.terraform == 'true'
        run: terraform init

      - name: Terraform Validate
        if: steps.tf_changes.outputs.terraform == 'true'
        run: terraform validate

      - name: Terraform Apply
        if: steps.tf_changes.outputs.terraform == 'true'
        run: terraform apply -auto-approve -lock-timeout=5m
        env:
          TF_VAR_cluster_name: ${{ env.CLUSTER_NAME }}
          TF_VAR_region: ${{ env.AWS_REGION }}
          TF_VAR_vpc_cidr: ${{ env.VPC_CIDR }}

      # -------------------------------
      # Login to Amazon ECR
      # -------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------------
      # Build & Push Docker Image
      # -------------------------------
      - name: Build & Push Docker Image
        env:
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -e
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Building and pushing: $IMAGE_URI"
          docker build -t "$IMAGE_URI" ./my-web-app
          docker push "$IMAGE_URI"

      # -------------------------------
      # Update Kubernetes Manifest (GitOps)
      # -------------------------------
      - name: Update Deployment Image
        env:
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -e
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Updating deployment.yaml image to: $IMAGE_URI"

          # Update only the first 'image:' occurrence
          sed -i -E "0,/^\s*image:\s*.*/s|^\s*image:\s*.*|        image: ${IMAGE_URI}|" my-web-app/deployment.yaml

      # -------------------------------
      # Commit & Push Updated Manifest
      # -------------------------------
      - name: Commit Updated Manifest
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add my-web-app/deployment.yaml

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "chore(gitops): update my-web-app image to ${IMAGE_TAG} [skip ci]"
          git push origin main