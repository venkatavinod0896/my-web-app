apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: ecommerce-gateway
  namespace: ecommerce
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
  - port:
      number: 443
      name: https
      protocol: HTTP
    hosts:
    - "*"
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: ecommerce-virtualservice
  namespace: ecommerce
spec:
  hosts:
  - "*"
  gateways:
  - ecommerce-gateway
  http:
  - match:
    - uri:
        exact: /
    rewrite:
      uri: /products
    route:
    - destination:
        host: product-service
        subset: v1
        port:
          number: 80
      weight: 90
    - destination:
        host: product-service
        subset: v2
        port:
          number: 80
      weight: 10
  - match:
    - uri:
        prefix: /products
    retries:
      attempts: 3
      perTryTimeout: 2s
    timeout: 5s
    route:
    - destination:
        host: product-service
        subset: v1
        port:
          number: 80
      weight: 90
    - destination:
        host: product-service
        subset: v2
        port:
          number: 80
      weight: 10
  - match:
    - uri:
        prefix: /cart
    route:
    - destination:
        host: cart-service
        port:
          number: 80
  - match:
    - uri:
        prefix: /orders
    route:
    - destination:
        host: order-service
        port:
          number: 80
  - match:
    - uri:
        prefix: /payments
    route:
    - destination:
        host: payment-service
        port:
          number: 80
  - match:
    - uri:
        prefix: /users
    route:
    - destination:
        host: user-service
        port:
          number: 80
