apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: KarpenterNodeRole-gitops-eks
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: gitops-eks
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: gitops-eks
  tags:
    Name: gitops-eks-karpenter-node
    Environment: dev
    ManagedBy: karpenter